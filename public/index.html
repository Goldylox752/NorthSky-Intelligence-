<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">Ripper Pipeline</h1>
            <button onclick="clearCache()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-semibold transition">Clear Redis Cache</button>
        </header>

        <!-- Stats Grid -->
        <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 text-center">
            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                <p class="text-slate-400 text-xs uppercase mb-1">Status</p>
                <p id="status" class="text-xl font-mono text-green-400">Offline</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                <p class="text-slate-400 text-xs uppercase mb-1">Cached Rips</p>
                <p id="totalCached" class="text-xl font-mono">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                <p class="text-slate-400 text-xs uppercase mb-1">Uptime</p>
                <p id="uptime" class="text-xl font-mono">0s</p>
            </div>
        </div>

        <!-- Log Viewer -->
        <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
            <div class="bg-slate-700 px-4 py-2 text-xs font-bold text-slate-300">Live Audit Logs</div>
            <pre id="log-view" class="p-4 text-xs font-mono h-64 overflow-y-auto leading-relaxed text-slate-300"></pre>
        </div>
    </div>

    <script>
        const API_KEY = 'your-secret-key-123'; // Matches your backend key

        async function updateDashboard() {
            try {
                // Fetch Stats
                const statsRes = await fetch('/dashboard/stats', { headers: { 'x-api-key': API_KEY } });
                const stats = await statsRes.json();
                document.getElementById('status').innerText = stats.status.toUpperCase();
                document.getElementById('totalCached').innerText = stats.total_cached_rips;
                document.getElementById('uptime').innerText = Math.floor(stats.uptime) + 's';

                // Fetch Logs
                const logRes = await fetch('/dashboard/logs', { headers: { 'x-api-key': API_KEY } });
                const logs = await logRes.json();
                document.getElementById('log-view').innerText = logs.map(l => `[${l.timestamp}] ${l.level.toUpperCase()}: ${l.message}`).join('\n');
            } catch (err) {
                console.error("Dashboard Sync Failed", err);
            }
        }

        async function clearCache() {
            if (confirm("Are you sure you want to flush Redis?")) {
                await fetch('/dashboard/clear-cache', { headers: { 'x-api-key': API_KEY } });
                updateDashboard();
            }
        }

        // Poll for updates every 5 seconds
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
