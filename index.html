<script>
// =============================
// 🔐 GLOBAL STATE
// =============================
const state = {
  loading: false
};

// =============================
// 🔍 VALID URL
// =============================
function isURL(str) {
  return /^https?:\/\//i.test(str.trim());
}

// =============================
// 📸 SCREENSHOT
// =============================
function getScreenshot(url) {
  return `https://image.thum.io/get/fullpage/${encodeURIComponent(url)}`;
}

// =============================
// 📊 SCORE ENGINE (UPGRADED)
// =============================
function calculateScore(data) {
  let score = 0;
  let issues = [];

  if (data.title) score += 2;
  else issues.push("Missing title");

  if (data.description) score += 2;
  else issues.push("No meta description");

  if (data.ogImage) score += 2;
  else issues.push("No social preview image");

  if (data.keywords && data.keywords.length > 5) score += 2;
  else issues.push("Weak keyword targeting");

  if (data.content && data.content.length > 800) score += 2;
  else issues.push("Thin content");

  return {
    score,
    percent: (score / 10) * 100,
    issues: issues.length ? issues : ["Strong overall setup"]
  };
}

// =============================
// 🎬 LOADING UI
// =============================
async function showLoading(output) {
  output.innerHTML = `
    🤖 Analyzing website...<br><br>
    🔍 Scanning SEO...
  `;

  await delay(500);
  output.innerHTML += "<br>📊 Checking structure...";
  await delay(500);
  output.innerHTML += "<br>⚡ Generating insights...";
}

// =============================
// 🧠 BUILD DATA + UI
// =============================
async function buildInputData(input, output) {
  const inputData = input.trim();
  const mode = document.getElementById("mode")?.value || "sales";

  const previewCard = document.getElementById("previewCard");
  const ogImageEl = document.getElementById("ogImage");
  const screenshotEl = document.getElementById("screenshot");

  const scoreCard = document.getElementById("scoreCard");
  const scoreBar = document.getElementById("scoreBar");
  const scoreText = document.getElementById("scoreText");
  const scoreReason = document.getElementById("scoreReason");

  // RESET UI
  if (previewCard) previewCard.style.display = "none";
  if (scoreCard) scoreCard.style.display = "none";

  if (ogImageEl) {
    ogImageEl.style.display = "none";
    ogImageEl.src = "";
  }

  if (screenshotEl) screenshotEl.src = "";

  // =============================
  // 🔍 SCRAPE WEBSITE
  // =============================
  if (isURL(inputData)) {
    await showLoading(output);

    try {
      const res = await fetch('/api/scrape', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: inputData })
      });

      const data = await res.json();

      if (!res.ok || !data) {
        output.innerText = "⚠️ Failed to analyze site";
        return null;
      }

      const keywords = data.keywords || [];

      // =============================
      // 👁 PREVIEW UI
      // =============================
      if (previewCard) previewCard.style.display = "block";

      if (data.ogImage && ogImageEl) {
        ogImageEl.src = data.ogImage;
        ogImageEl.style.display = "block";
      }

      if (screenshotEl) {
        screenshotEl.src = getScreenshot(inputData);
      }

      // =============================
      // 📊 SCORE UI
      // =============================
      const scoreData = calculateScore(data);

      if (scoreCard) scoreCard.style.display = "block";
      if (scoreBar) scoreBar.style.width = scoreData.percent + "%";
      if (scoreText) scoreText.innerText = `Score: ${scoreData.score}/10`;
      if (scoreReason) scoreReason.innerText = scoreData.issues.join(", ");

      // =============================
      // 🧠 BUILD AI PROMPT
      // =============================
      if (mode === "sales") {
        return `
You are a world-class sales expert.

Business:
${data.title || data.ogTitle || "Unknown"}

Description:
${data.description || "No description"}

Keywords:
${keywords.join(", ") || "None"}

Score:
${scoreData.score}/10

Task:
1. What they do
2. Who they target
3. Write a high-converting sales message
`;
      }

      if (mode === "competitor") {
        return `
You are a CRO and marketing expert.

Business:
${data.title || data.ogTitle || "Unknown"}

Description:
${data.description || "No description"}

Keywords:
${keywords.join(", ") || "None"}

Score:
${scoreData.score}/10

Task:
1. Strengths
2. Weaknesses
3. How to beat them
4. Better offer + positioning
`;
      }
    } catch (err) {
      console.error(err);
      output.innerText = "⚠️ Error analyzing site";
      return null;
    }
  }

  return inputData;
}

// =============================
// 🚀 RUN AI
// =============================
async function runAI() {
  if (state.loading) return;

  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");

  if (!input.trim()) {
    output.innerText = "Enter input";
    return;
  }

  state.loading = true;

  const inputData = await buildInputData(input, output);
  if (!inputData) {
    state.loading = false;
    return;
  }

  output.innerText = "Thinking... 🤖";

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: inputData })
    });

    const data = await res.json();

    if (res.ok && data.reply) {
      output.innerText = data.reply;
    } else {
      output.innerText = data.error || "Error generating response";
    }

  } catch (err) {
    console.error(err);
    output.innerText = "⚠️ Connection failed";
  }

  state.loading = false;
}

// =============================
// ⏱ UTIL
// =============================
function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}
</script>
