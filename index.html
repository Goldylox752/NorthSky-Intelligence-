<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NorthSky Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
}

.logo {
  font-weight: 700;
  font-size: 18px;
}

.nav button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  background: #6366f1;
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px 40px;
}

.hero h1 {
  font-size: 48px;
  font-weight: 700;
}

.hero p {
  opacity: 0.7;
  margin-top: 10px;
  font-size: 18px;
}

/* MAIN CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* GLASS CARD */
.card {
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
}

/* INPUTS */
.input-box {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
}

button {
  padding: 14px 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  opacity: 0.9;
}

/* FEATURES */
.features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 40px;
}

.feature {
  text-align: center;
  padding: 20px;
  border-radius: 12px;
  background: rgba(30,41,59,0.5);
}

/* VIRAL BAR */
.bar {
  height: 10px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  background: #22c55e;
}

/* HISTORY */
.history div {
  cursor: pointer;
  margin-top: 5px;
  font-size: 13px;
  opacity: 0.7;
}

.history div:hover {
  opacity: 1;
}

/* FOOTER CTA */
.cta {
  text-align: center;
  margin-top: 60px;
}

.cta h2 {
  font-size: 28px;
}

.cta button {
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">🚀 NorthSky</div>
  <button onclick="upgrade()">Upgrade</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Turn Any URL Into Growth Intelligence</h1>
  <p>Analyze • Compare • Discover Viral Trends</p>
</div>

<div class="container">

  <!-- INPUT -->
  <div class="card">
    <div class="input-box">
      <input id="urlInput" placeholder="Paste URL..." />
      <button onclick="runAI()">Analyze</button>
    </div>
  </div>

  <!-- COMPARE -->
  <div class="card">
    <div class="input-box">
      <input id="url1" placeholder="Competitor 1" />
      <input id="url2" placeholder="Competitor 2" />
      <button onclick="compare()">Compare</button>
    </div>
  </div>

  <!-- TRENDING -->
  <div class="card">
    <button onclick="getTrending()">🔥 Find Trending Content</button>
  </div>

  <!-- FEATURES -->
  <div class="features">
    <div class="feature">⚡ Instant Insights</div>
    <div class="feature">🧠 AI Analysis</div>
    <div class="feature">📈 Growth Ideas</div>
  </div>

  <!-- OUTPUT -->
  <div id="output"></div>

  <!-- HISTORY -->
  <div class="card history" id="history"></div>

  <!-- CTA -->
  <div class="cta">
    <h2>Unlock Unlimited Analysis</h2>
    <button onclick="upgrade()">💰 Go Pro</button>
  </div>

</div>

<script>
const API_URL = "https://northsky-ai.onrender.com";

/* ANALYZE */
async function runAI() {
  const url = document.getElementById("urlInput").value;
  const output = document.getElementById("output");

  output.innerHTML = "<div class='card'>Analyzing...</div>";

  const res = await fetch(`${API_URL}/api/rip?url=${encodeURIComponent(url)}`);
  const data = await res.json();

  if (data.upgrade) {
    output.innerHTML = `
      <div class='card'>
        💰 Free limit reached<br><br>
        <button onclick="upgrade()">Upgrade</button>
      </div>
    `;
    return;
  }

  render(data);
  saveHistory(url);
}

/* RENDER */
function render(data) {
  const ai = data.analysis || {};
  const score = ai.viral_score || 0;

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h2>${data.metadata.title}</h2>
      <p>${data.metadata.description}</p>

      <h3>Viral Score: ${score}/10</h3>
      <div class="bar">
        <div class="fill" style="width:${score * 10}%"></div>
      </div>

      <p>${ai.summary || ""}</p>
    </div>
  `;
}

/* COMPARE */
async function compare() {
  const u1 = document.getElementById("url1").value;
  const u2 = document.getElementById("url2").value;

  const [r1, r2] = await Promise.all([
    fetch(`${API_URL}/api/rip?url=${encodeURIComponent(u1)}`).then(r => r.json()),
    fetch(`${API_URL}/api/rip?url=${encodeURIComponent(u2)}`).then(r => r.json())
  ]);

  const v1 = r1.analysis?.viral_score || 0;
  const v2 = r2.analysis?.viral_score || 0;

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h2>⚔️ Comparison</h2>

      <p>${u1}</p>
      <div class="bar"><div class="fill" style="width:${v1*10}%"></div></div>

      <p>${u2}</p>
      <div class="bar"><div class="fill" style="width:${v2*10}%"></div></div>

      <h3>Winner: ${v1 > v2 ? u1 : u2}</h3>
    </div>
  `;
}

/* TRENDING */
async function getTrending() {
  const res = await fetch(`${API_URL}/api/trending`);
  const data = await res.json();

  let html = "<div class='card'><h2>🔥 Trending</h2>";

  data.results.forEach(item => {
    html += `
      <div>
        ${item.title}<br>
        <button onclick="quickAnalyze('${item.url}')">Analyze</button>
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("output").innerHTML = html;
}

function quickAnalyze(url) {
  document.getElementById("urlInput").value = url;
  runAI();
}

/* HISTORY */
function saveHistory(url) {
  let h = JSON.parse(localStorage.getItem("history") || "[]");
  h.unshift(url);
  h = h.slice(0,5);
  localStorage.setItem("history", JSON.stringify(h));
  renderHistory();
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem("history") || "[]");

  document.getElementById("history").innerHTML =
    "<h4>Recent</h4>" +
    h.map(x => `<div onclick="quickAnalyze('${x}')">${x}</div>`).join("");
}

renderHistory();

/* STRIPE */
async function upgrade() {
  const res = await fetch(`${API_URL}/api/create-checkout`, {
    method: "POST"
  });

  const data = await res.json();
  window.location.href = data.url;
}
</script>

</body>
</html>
