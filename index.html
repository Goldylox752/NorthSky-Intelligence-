<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 30px;
}

.hero {
  text-align: center;
  padding: 50px 20px;
}

.input-box {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
}

button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.upgrade {
  background: linear-gradient(135deg, #22c55e, #16a34a);
}

.card {
  background: rgba(30,41,59,0.6);
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

.bar {
  height: 10px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 5px;
}

.fill {
  height: 100%;
  background: #22c55e;
}

.history div {
  cursor: pointer;
  margin-top: 5px;
  font-size: 13px;
}
</style>
</head>

<body>
<div class="container">

  <div class="hero">
    <h1>🚀 NorthSky Intelligence</h1>
    <p>Analyze • Compare • Discover Trends</p>
    <button class="upgrade" onclick="upgrade()">💰 Upgrade</button>
  </div>

  <!-- ANALYZE -->
  <div class="input-box">
    <input id="urlInput" placeholder="Enter URL..." />
    <button onclick="runAI()">Analyze</button>
  </div>

  <!-- COMPARE -->
  <div class="input-box">
    <input id="url1" placeholder="Competitor 1" />
    <input id="url2" placeholder="Competitor 2" />
    <button onclick="compare()">Compare</button>
  </div>

  <!-- TRENDING -->
  <button onclick="getTrending()">🔥 Find Trending</button>

  <div id="usage"></div>
  <div id="output"></div>
  <div class="history" id="history"></div>

</div>

<script>
const API_URL = "https://northsky-ai.onrender.com";

/* ================= USAGE ================= */
function incrementUsage() {
  let usage = parseInt(localStorage.getItem("usage") || "0");
  usage++;
  localStorage.setItem("usage", usage);
  document.getElementById("usage").innerText = `Usage: ${usage}`;
}

/* ================= UPGRADE ================= */
async function upgrade() {
  const res = await fetch(`${API_URL}/api/create-checkout`, {
    method: "POST"
  });

  const data = await res.json();
  window.location.href = data.url;
}

/* ================= ANALYZE ================= */
async function runAI() {
  const url = document.getElementById("urlInput").value;
  const output = document.getElementById("output");

  if (!url) {
    output.innerHTML = "<div class='card'>Enter a URL</div>";
    return;
  }

  output.innerHTML = "<div class='card'>Analyzing...</div>";

  try {
    const res = await fetch(`${API_URL}/api/rip?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (data.upgrade) {
      output.innerHTML = `
        <div class='card'>
          💰 Free limit reached<br><br>
          <button class="upgrade" onclick="upgrade()">Upgrade to Pro</button>
        </div>
      `;
      return;
    }

    render(data);
    saveHistory(url);
    incrementUsage();

  } catch {
    output.innerHTML = "<div class='card'>Error loading</div>";
  }
}

/* ================= COMPARE ================= */
async function compare() {
  const u1 = document.getElementById("url1").value;
  const u2 = document.getElementById("url2").value;

  if (!u1 || !u2) return;

  const [r1, r2] = await Promise.all([
    fetch(`${API_URL}/api/rip?url=${encodeURIComponent(u1)}`).then(r => r.json()),
    fetch(`${API_URL}/api/rip?url=${encodeURIComponent(u2)}`).then(r => r.json())
  ]);

  const v1 = r1.analysis?.viral_score || 0;
  const v2 = r2.analysis?.viral_score || 0;

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h2>⚔️ Comparison</h2>

      <p>${u1}</p>
      <div class="bar"><div class="fill" style="width:${v1 * 10}%"></div></div>

      <p>${u2}</p>
      <div class="bar"><div class="fill" style="width:${v2 * 10}%"></div></div>

      <h3>Winner: ${v1 > v2 ? u1 : u2}</h3>
    </div>
  `;

  incrementUsage();
}

/* ================= TRENDING ================= */
async function getTrending() {
  const res = await fetch(`${API_URL}/api/trending`);
  const data = await res.json();

  let html = "<div class='card'><h2>🔥 Trending</h2>";

  data.results.forEach(item => {
    html += `
      <div>
        ${item.title}<br>
        <button onclick="quickAnalyze('${item.url}')">Analyze</button>
      </div>
    `;
  });

  html += "</div>";
  document.getElementById("output").innerHTML = html;
}

function quickAnalyze(url) {
  document.getElementById("urlInput").value = url;
  runAI();
}

/* ================= RENDER ================= */
function render(data) {
  const ai = data.analysis || {};
  const score = ai.viral_score || 0;

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h2>${data.metadata?.title || "Untitled"}</h2>
      <p>${data.metadata?.description || ""}</p>

      <h3>Viral Score: ${score}/10</h3>
      <div class="bar"><div class="fill" style="width:${score * 10}%"></div></div>

      <p>${ai.summary || ""}</p>
    </div>
  `;
}

/* ================= HISTORY ================= */
function saveHistory(url) {
  let h = JSON.parse(localStorage.getItem("history") || "[]");
  h.unshift(url);
  h = h.slice(0, 5);
  localStorage.setItem("history", JSON.stringify(h));
  renderHistory();
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem("history") || "[]");

  document.getElementById("history").innerHTML =
    "<h4>History</h4>" +
    h.map(x => `<div onclick="quickAnalyze('${x}')">${x}</div>`).join("");
}

renderHistory();
</script>

</body>
</html>
