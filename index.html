<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky AI</title>

<style>
:root {
  --bg:#020617;
  --card:#1e293b;
  --text:#f8fafc;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  text-align:center;
}

.container{
  max-width:650px;
  margin:auto;
  padding:25px 18px;
}

.card{
  background:var(--card);
  padding:22px;
  border-radius:14px;
  margin-top:20px;
}

.btn{
  width:100%;
  padding:16px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  font-weight:bold;
  cursor:pointer;
}

textarea,input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

#output{
  margin-top:15px;
  background:#0f172a;
  padding:12px;
  border-radius:8px;
  min-height:60px;
}

/* 🔥 PREVIEW STYLING */
#previewCard{
  display:none;
  margin-top:15px;
  text-align:left;
}

#previewCard img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
  box-shadow:0 0 20px rgba(56,189,248,0.25);
}
</style>
</head>

<body>

<div class="container">

<h1>AI Lead & Competitor Analyzer</h1>

<div class="card">
  <select id="mode">
    <option value="sales">💰 Sales Reply</option>
    <option value="competitor">📊 Competitor Analysis</option>
  </select>

  <textarea id="lead" placeholder="Paste a message OR website URL..."></textarea>

  <button onclick="runAI()" class="btn">Run AI</button>

  <!-- 🔎 PREVIEW -->
  <div id="previewCard">
    <p>🔎 Website Preview</p>
    <img id="ogImage" style="display:none;" />
    <img id="screenshot" />
  </div>

  <div id="output"></div>
</div>

</div>

<script>
// 🔍 URL CHECK
function isURL(str) {
  return str.startsWith("http://") || str.startsWith("https://");
}

// 📸 SCREENSHOT
function getScreenshot(url) {
  return `https://image.thum.io/get/fullpage/${url}`;
}

// 🧠 BUILD INPUT + PREVIEW
async function buildInputData(input, output) {
  let inputData = input;
  const mode = document.getElementById("mode").value;

  const previewCard = document.getElementById("previewCard");
  const ogImageEl = document.getElementById("ogImage");
  const screenshotEl = document.getElementById("screenshot");

  // RESET PREVIEW
  previewCard.style.display = "none";
  ogImageEl.style.display = "none";
  screenshotEl.src = "";

  if (isURL(input)) {
    output.innerText = "Analyzing website... 🔍";

    try {
      const res = await fetch('/api/scrape', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ url: input })
      });

      const data = await res.json();

      if (!res.ok) {
        output.innerText = "Scrape failed";
        return null;
      }

      // 🔥 SHOW PREVIEW
      previewCard.style.display = "block";

      // OG IMAGE
      if (data.ogImage) {
        ogImageEl.src = data.ogImage;
        ogImageEl.style.display = "block";
      }

      // SCREENSHOT (always show)
      screenshotEl.src = getScreenshot(input);

      // 🧠 MODES
      if (mode === "sales") {
        inputData = `
You are an AI sales expert.

Business:
${data.title || data.ogTitle}

${data.description}

Task:
1. What they do
2. Who they target
3. Write a high-converting reply
`;
      }

      if (mode === "competitor") {
        inputData = `
You are a marketing expert.

Business:
${data.title || data.ogTitle}

${data.description}

Task:
1. Strengths
2. Weaknesses
3. How to beat them
4. Better sales pitch
`;
      }

    } catch {
      output.innerText = "Error scraping site";
      return null;
    }
  }

  return inputData;
}

// 🚀 RUN AI
async function runAI() {
  const input = document.getElementById("lead").value;
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter input";
    return;
  }

  const inputData = await buildInputData(input, output);
  if (!inputData) return;

  output.innerText = "Thinking... 🤖";

  try {
    const res = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ message: inputData })
    });

    const data = await res.json();
    output.innerText = res.ok ? data.reply : "Error";

  } catch {
    output.innerText = "Connection failed";
  }
}
</script>

</body>
</html>
