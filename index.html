<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 30px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
}

.hero h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.7;
}

/* INPUT */
.input-box {
  display: flex;
  gap: 10px;
  background: rgba(30, 41, 59, 0.5);
  padding: 10px;
  border-radius: 14px;
  backdrop-filter: blur(10px);
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
  font-size: 14px;
}

button {
  padding: 14px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  opacity: 0.9;
}

/* FEATURES */
.features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.features div {
  background: rgba(30, 41, 59, 0.4);
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-size: 14px;
  opacity: 0.85;
}

/* CARDS */
.card {
  background: rgba(30, 41, 59, 0.6);
  border-radius: 16px;
  padding: 20px;
  margin-top: 25px;
  backdrop-filter: blur(12px);
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.label {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 4px;
}

.badge {
  margin-top: 10px;
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: #22c55e;
  font-size: 12px;
}

/* STATUS */
.loader {
  text-align: center;
  margin-top: 20px;
  opacity: 0.6;
}

.usage {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.6;
}

/* HISTORY */
.history {
  margin-top: 30px;
}

.history h4 {
  margin-bottom: 10px;
  opacity: 0.7;
}

.history div {
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 13px;
}

.history div:hover {
  background: rgba(255,255,255,0.05);
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🚀 NorthSky Intelligence</h1>
    <p>Turn any URL into AI-powered marketing insights</p>
  </div>
  <div class="input-box">
    <input id="urlInput" placeholder="Paste any URL (YouTube, website...)" />
    <button onclick="runAI()">Analyze</button>
  </div>
  <div class="features">
    <div>⚡ Instant Insights</div>
    <div>🧠 AI Analysis</div>
    <div>📈 Growth Ideas</div>
  </div>
  <div class="usage" id="usage"></div>
  <div class="loader" id="loader"></div>
  <div id="output"></div>
  <div class="history" id="history"></div>
</div>
<script>
const API_URL = "https://northsky-ai.onrender.com";

/* INIT */
if (!localStorage.getItem("api_key")) {
  localStorage.setItem("api_key", "your-super-secret-key");
}
if (!localStorage.getItem("usage")) {
  localStorage.setItem("usage", "0");
}
if (!localStorage.getItem("history")) {
  localStorage.setItem("history", JSON.stringify([]));
}

updateUsage();
renderHistory();

/* MAIN */
async function runAI() {
  const url = document.getElementById("urlInput").value;
  const output = document.getElementById("output");
  const loader = document.getElementById("loader");

  if (!url.trim()) {
    output.innerHTML = "<div class='card'>Enter a URL</div>";
    return;
  }

  loader.innerText = "⚡ Analyzing...";
  output.innerHTML = "";

  try {
    const res = await fetch(`${API_URL}/rip?url=${encodeURIComponent(url)}`, {
      headers: {
        "x-api-key": localStorage.getItem("api_key")
      }
    });

    const data = await res.json();
    loader.innerText = "";

    if (!res.ok) {
      output.innerHTML = `<div class='card'>${data.error}</div>`;
      return;
    }

    render(data);
    saveHistory(url);
    incrementUsage();

  } catch (e) {
    loader.innerText = "";
    output.innerHTML = "<div class='card'>Connection failed</div>";
  }
}

/* RENDER */
function render(data) {
  const output = document.getElementById("output");

  output.innerHTML = `
    <div class="card">
      <h2>${data.metadata.title}</h2>
      <p>${data.metadata.description}</p>

      ${data.metadata.image ? `<img src="${data.metadata.image}" />` : ""}
      ${data.screenshot ? `<img src="${data.screenshot}" />` : ""}

      <div class="label">Platform: ${data.platform}</div>
    </div>

    ${data.analysis ? `
      <div class="card">
        <h3>🧠 AI Intelligence</h3>

        <div class="grid">
          <div>
            <div class="label">Summary</div>
            <p>${data.analysis.summary}</p>
          </div>

          <div>
            <div class="label">Hook</div>
            <p>${data.analysis.hook}</p>
          </div>

          <div>
            <div class="label">Audience</div>
            <p>${data.analysis.target_audience}</p>
          </div>

          <div>
            <div class="label">Monetization</div>
            <p>${data.analysis.monetization_angle}</p>
          </div>
        </div>

        <div class="badge">Viral Score: ${data.analysis.viral_score}</div>
      </div>
    ` : ""}
  `;
}

/* HISTORY */
function saveHistory(url) {
  let history = JSON.parse(localStorage.getItem("history"));
  history.unshift(url);
  history = history.slice(0, 5);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history"));
  const el = document.getElementById("history");

  el.innerHTML = "<h4>Recent Searches</h4>" +
    history.map(h => `<div onclick="reuse('${h}')">${h}</div>`).join("");
}

function reuse(url) {
  document.getElementById("urlInput").value = url;
}

/* USAGE */
function incrementUsage() {
  let usage = parseInt(localStorage.getItem("usage"));
  usage++;
  localStorage.setItem("usage", usage);
  updateUsage();
}

function updateUsage() {
  const usage = localStorage.getItem("usage");
  document.getElementById("usage").innerText =
    `Usage: ${usage}/100 requests`;
}
</script>
</body>
</html>
