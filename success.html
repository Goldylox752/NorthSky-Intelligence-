<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center;padding:40px;font-family:Arial;">

<h1>🎉 Payment Successful</h1>
<p>Your AI system is ready</p>

<div style="background:#1e293b;padding:20px;border-radius:10px;">
  <h3>Your API Key</h3>
  <p id="key">Loading...</p>
</div>

<button onclick="copyKey()">Copy API Key</button>

<script>
async function loadKey() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");

  const res = await fetch(`/api/get-key?session_id=${sessionId}`);
  const data = await res.json();

  if (data.api_key) {
    document.getElementById("key").innerText = data.api_key;
    localStorage.setItem("apiKey", data.api_key);
  } else {
    document.getElementById("key").innerText = "Error loading key";
  }
}

function copyKey() {
  const key = document.getElementById("key").innerText;
  navigator.clipboard.writeText(key);
  alert("Copied!");
}

loadKey();
</script>

</body>
</html>
