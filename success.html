<script>
async function load() {
  const url = window.location.href;

  // 🔥 Extract session_id safely
  const match = url.match(/session_id=([^&]+)/);
  const sessionId = match ? match[1] : null;

  if (!sessionId) {
    document.body.innerHTML = "❌ Missing session ID in URL";
    return;
  }

  try {
    const res = await fetch('/api/get-key?session_id=' + sessionId);
    const data = await res.json();

    if (!data.api_key) {
      document.body.innerHTML = "❌ API key not found yet (wait 2–3 sec)";
      return;
    }

    // ✅ SAVE KEY
    localStorage.setItem("apiKey", data.api_key);

    document.body.innerHTML = "✅ Setup complete... redirecting";

    setTimeout(() => {
      window.location.href = "/dashboard.html";
    }, 1500);

  } catch (err) {
    document.body.innerHTML = "❌ Failed to connect to server";
  }
}

load();
</script>
