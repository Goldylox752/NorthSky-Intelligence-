<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky AI Engine Dashboard</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --accent:#38bdf8;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card h3 { color:#94a3b8; margin:0; }
.card p { font-size:1.8rem; color:var(--accent); margin-top:10px; }

table {
  width:100%;
  margin-top:30px;
  border-collapse:collapse;
  background:var(--card);
}

th, td {
  padding:12px;
  border-bottom:1px solid #334155;
}

th {
  background:#334155;
  text-transform:uppercase;
  font-size:12px;
}
</style>
</head>

<body>

<h1>NorthSky AI Engine <span style="color:var(--accent)">Dashboard</span></h1>

<div class="grid">
  <div class="card"><h3>Total Cached</h3><p id="cached">0</p></div>
  <div class="card"><h3>Uptime</h3><p id="uptime">0h</p></div>
  <div class="card"><h3>RAM</h3><p id="ram">0MB</p></div>
</div>

<h2>Recent Activity</h2>

<table>
<thead>
<tr>
<th>Time</th>
<th>Action</th>
<th>URL</th>
<th>Status</th>
</tr>
</thead>
<tbody id="logs"></tbody>
</table>

<script>
const API = "http://localhost:3000/dashboard";
const HEADERS = { "x-api-key": "your-super-secret-key" };

async function load() {
  const stats = await fetch(`${API}/stats`, { headers: HEADERS }).then(r => r.json());
  document.getElementById("cached").innerText = stats.total_cached_rips;
  document.getElementById("uptime").innerText = (stats.uptime / 3600).toFixed(1) + "h";
  document.getElementById("ram").innerText = (stats.memory_usage / 1024 / 1024).toFixed(0) + "MB";

  const logs = await fetch(`${API}/logs`, { headers: HEADERS }).then(r => r.json());
  document.getElementById("logs").innerHTML = logs.map(l => `
    <tr>
      <td>${new Date(l.timestamp).toLocaleTimeString()}</td>
      <td>${l.action}</td>
      <td>${l.url}</td>
      <td>${l.level}</td>
    </tr>
  `).join('');
}

setInterval(load, 5000);
load();
</script>

</body>
</html>
